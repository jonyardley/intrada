<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Intrada</title>
    <link data-trunk rel="rust" data-wasm-opt="z" href="Cargo.toml" />
    <link data-trunk rel="css" href="tailwind-output.css" />
    <script>
      // Auth helper bridge — used by WASM via wasm_bindgen(inline_js)
      // Skip if already defined (E2E tests inject a mock via addInitScript)
      if (!window.__intrada_auth) window.__intrada_auth = {
        _clerk: null,
        _ready: false,
        _initFailed: false,
        async init(publishableKey) {
          if (!publishableKey || this._ready) return;
          try {
            const Clerk = window.Clerk;
            if (!Clerk) { this._initFailed = true; return; }
            this._clerk = new Clerk(publishableKey);
            await this._clerk.load();
            this._ready = true;
          } catch (e) {
            console.error("Clerk init failed:", e);
            this._initFailed = true;
          }
        },
        initFailed() {
          return this._initFailed;
        },
        isSignedIn() {
          if (!this._ready || !this._clerk) return false;
          return !!this._clerk.user;
        },
        async getToken() {
          if (!this._ready || !this._clerk || !this._clerk.session) return null;
          try {
            return await this._clerk.session.getToken();
          } catch (e) {
            console.error("getToken failed:", e);
            return null;
          }
        },
        getUserId() {
          if (!this._ready || !this._clerk || !this._clerk.user) return null;
          return this._clerk.user.id;
        },
        async signOut() {
          if (!this._ready || !this._clerk) return;
          await this._clerk.signOut();
        },
        async signInWithGoogle() {
          if (!this._ready || !this._clerk) return;
          await this._clerk.authenticateWithRedirect({
            strategy: "oauth_google",
            redirectUrl: window.location.origin + "/",
            redirectUrlComplete: window.location.origin + "/",
          });
        },
        addListener(callback) {
          if (!this._ready || !this._clerk) return;
          this._clerk.addListener(callback);
        },
      };
    </script>
    <script
      async
      crossorigin="anonymous"
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
      onload="
        if (window.__intrada_clerk_key) {
          window.__intrada_auth.init(window.__intrada_clerk_key);
        }
      "
    ></script>
  </head>
  <body>
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: system-ui, sans-serif;">
        <h1>JavaScript Required</h1>
        <p>Intrada requires JavaScript to run. Please enable JavaScript in your browser settings and reload the page.</p>
      </div>
    </noscript>
  </body>
</html>
