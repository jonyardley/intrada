    <!-- Release tag for Sentry. Defaults to null (PR builds, local dev) and
         is replaced by CI's deploy step with `sed` before publishing to
         Cloudflare — the literal string `__SENTRY_RELEASE_PLACEHOLDER__`
         is the swap target. Keep this script BEFORE the Sentry SDK so the
         init below can read it. -->
    <script>window.__SENTRY_RELEASE__ = "__SENTRY_RELEASE_PLACEHOLDER__";</script>

    <!-- Sentry browser SDK. Loaded synchronously in <head> so it's ready
         before any other script runs — catches errors from the inline
         scripts below (data-platform setup, press feedback, Clerk bridge)
         and from the WASM panic hook. The DSN is public by design (Sentry's
         security model expects it embedded in client code); environment is
         tagged at runtime so dev/prod/ios events are filterable in the UI.

         Self-hosted instead of loaded from `browser.sentry-cdn.com` because
         the CDN domain is on common ad/tracker blocklists (uBlock Origin,
         Brave Shields, etc.) — blocked users would otherwise have
         `window.Sentry` undefined and lose all observability coverage.
         Bump the bundle by re-running `scripts/vendor-sentry-sdk.sh`. -->
    <script src="/sentry/bundle.tracing.min.js"></script>
    <script>
      // Skip on plain-http localhost (web dev) to match the api/mobile
      // opt-in pattern and save event quota. iOS production WebView is also
      // hosted at `tauri://localhost`, so the protocol check matters.
      (function () {
        if (!window.Sentry) return;
        var isWebDev = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
          && location.protocol !== 'tauri:';
        if (isWebDev) return;
        var release = window.__SENTRY_RELEASE__;
        // Treat the unsubstituted placeholder (PR builds, local dev) as no
        // release — undefined disables release tagging cleanly.
        if (typeof release !== 'string' || release.indexOf('PLACEHOLDER') !== -1) {
          release = undefined;
        }
        Sentry.init({
          dsn: "https://2a33748d4de845f26e3711629e47b38f@o4511313186979840.ingest.de.sentry.io/4511313298980944",
          release: release,
          environment: location.protocol === 'tauri:' ? 'ios' : 'production',
          // Bumped from 0.1 → 1.0 while traffic is single-digit-user (just
          // @jonyardley testing). Dial back to 0.1 (or 0.01) once real
          // traffic arrives — every transaction counts against quota.
          tracesSampleRate: 1.0,
          sendDefaultPii: false,
          // Tunnel events through our own origin so content blockers that
          // catch direct posts to *.ingest.sentry.io can't drop them. The
          // Cloudflare Worker (worker.js) terminates `/sentry-tunnel` and
          // forwards the envelope to Sentry's ingest endpoint.
          //
          // iOS WebView (`tauri://localhost`) doesn't run extensions and
          // its origin doesn't host the Worker — leave the tunnel off
          // there so events go straight to Sentry.
          tunnel: location.protocol === 'tauri:' ? undefined : '/sentry-tunnel',
          // Continue traces across the web → API boundary so one waterfall
          // shows route render → fetch → handler → DB. The Rust server's
          // SentryHttpLayer (intrada-api/src/routes/mod.rs) reads the
          // `sentry-trace` + `baggage` headers this propagation injects.
          // Strings: production hostname. Regex: dev path (Trunk proxies
          // /api/* to the local API server).
          tracePropagationTargets: ["intrada-api.fly.dev", /\/api\//],
          integrations: [Sentry.browserTracingIntegration()],
          // Defensive scrubber alongside sendDefaultPii: false. Any throw
          // here would drop the event entirely — keep wrapped in try/catch
          // and return the event unchanged on any failure.
          beforeSend: function (event) {
            // Drop benign errors that can't be fixed in code:
            // - View Transitions API: AbortError / InvalidStateError when a
            //   new nav fires before the previous transition settles. Leptos
            //   calls startViewTransition internally; we can't catch there.
            // - WASM LinkError / SyntaxError from transient cache coherence
            //   mismatch during deployment (stale JS glue vs new WASM)
            try {
              var msg = (event.message || '');
              if (event.exception && Array.isArray(event.exception.values)) {
                msg += ' ' + event.exception.values.map(function(v){ return v.value || ''; }).join(' ');
              }
              if (msg.indexOf('View transition was skipped') !== -1) return null;
              if (msg.indexOf('Transition was skipped') !== -1) return null;
              if (msg.indexOf('Transition was aborted') !== -1) return null;
              if (msg.indexOf('must be callable') !== -1 && msg.indexOf('LinkError') !== -1) return null;
              if (msg.indexOf('Importing binding name') !== -1) return null;
            } catch(e) {}
            try {
              var EMAIL_RE = /[\w.+-]+@[\w-]+(?:\.[\w-]+)+/g;
              var redactEmails = function (s) {
                return typeof s === 'string' ? s.replace(EMAIL_RE, '[email]') : s;
              };
              var stripAuthHeaders = function (headers) {
                if (!headers) return;
                if (Array.isArray(headers)) {
                  for (var i = headers.length - 1; i >= 0; i--) {
                    var pair = headers[i];
                    if (pair && typeof pair[0] === 'string' &&
                        pair[0].toLowerCase() === 'authorization') {
                      headers.splice(i, 1);
                    }
                  }
                } else if (typeof headers === 'object') {
                  Object.keys(headers).forEach(function (k) {
                    if (k.toLowerCase() === 'authorization') delete headers[k];
                  });
                }
              };
              if (event.request) stripAuthHeaders(event.request.headers);
              if (Array.isArray(event.breadcrumbs)) {
                event.breadcrumbs.forEach(function (b) {
                  if (b && b.data) stripAuthHeaders(b.data.headers || b.data);
                  if (b && typeof b.message === 'string') b.message = redactEmails(b.message);
                });
              }
              if (event.message) event.message = redactEmails(event.message);
              if (event.exception && Array.isArray(event.exception.values)) {
                event.exception.values.forEach(function (v) {
                  if (v && typeof v.value === 'string') v.value = redactEmails(v.value);
                });
              }
            } catch (e) {
              // Swallow — never drop events because of scrubber failure.
            }
            return event;
          },
        });
      })();
    </script>

    <script>
      // Set data-platform="ios" early so [data-platform="ios"] CSS applies
      // before first paint — no flicker. Tauri WebView always serves pages
      // from the tauri:// protocol; in a regular browser it's http(s):.
      // Replaces the lib.rs setup-hook eval which was racing page load on
      // device.
      if (location.protocol === 'tauri:') {
        document.documentElement.setAttribute('data-platform', 'ios');
        // Native iOS apps don't have pinch-zoom on the page. Override the
        // viewport meta to disable it inside the Tauri WebView only —
        // regular browser users keep their accessibility zoom.
        const viewport = document.querySelector('meta[name=viewport]');
        if (viewport) {
          viewport.setAttribute(
            'content',
            'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover'
          );
        }

        // Native iOS press feedback: visual press appears on touchstart but
        // cancels as soon as a scroll begins. CSS :active alone can't do this
        // — it stays "active" while finger is down even during scroll.
        // We add .is-pressed on touchstart and remove on movement > threshold
        // or on touchend / touchcancel. CSS targets .is-pressed instead of
        // :active for iOS press styling.
        (function () {
          let pressed = null;
          let startY = 0;
          let startX = 0;
          const THRESHOLD = 6;
          const release = () => {
            if (pressed) {
              pressed.classList.remove('is-pressed');
              pressed = null;
            }
          };
          document.addEventListener('touchstart', (e) => {
            const t = e.target.closest('button, a, [role="button"]');
            if (!t) return;
            release();
            pressed = t;
            startY = e.touches[0].clientY;
            startX = e.touches[0].clientX;
            t.classList.add('is-pressed');
          }, { passive: true });
          document.addEventListener('touchmove', (e) => {
            if (!pressed) return;
            const dy = Math.abs(e.touches[0].clientY - startY);
            const dx = Math.abs(e.touches[0].clientX - startX);
            if (dy > THRESHOLD || dx > THRESHOLD) release();
          }, { passive: true });
          document.addEventListener('touchend', release, { passive: true });
          document.addEventListener('touchcancel', release, { passive: true });
        })();
      }
    </script>
    <script>
      // Auth helper bridge — used by WASM via wasm_bindgen(inline_js)
      // Skip if already defined (E2E tests inject a mock via addInitScript)
      //
      // iOS and web use completely different auth strategies:
      // - Web: Clerk JS SDK (cookie-based sessions, CDN build)
      // - iOS: PAT-based auth. OAuth happens in Safari via
      //   ASWebAuthenticationSession (where Clerk JS works normally),
      //   then the Clerk JWT is exchanged for a long-lived PAT via
      //   POST /api/auth/ios/exchange. No Clerk JS in WKWebView.
      if (!window.__intrada_auth) window.__intrada_auth = {
        _clerk: null,
        _ready: false,
        _initFailed: false,
        _isNative: location.protocol === 'tauri:',
        _authListener: null,
        async init(publishableKey) {
          if (!publishableKey || this._ready) return;

          // ── iOS: PAT-based auth, no Clerk JS needed ──
          if (this._isNative) {
            window.__clerk_publishable_key = publishableKey;
            this._ready = true;
            return;
          }

          // ── Web: standard Clerk JS flow ──
          try {
            window.__clerk_publishable_key = publishableKey;
            if (!window.Clerk) {
              try {
                await new Promise((resolve, reject) => {
                  const s = document.createElement('script');
                  s.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';
                  s.crossOrigin = 'anonymous';
                  s.onload = resolve;
                  s.onerror = () => reject(new Error('CDN script load failed'));
                  document.head.appendChild(s);
                });
              } catch (e) {
                this._lastError = 'script_load: ' + e.message;
                this._initFailed = true;
                return;
              }
            }
            const clerk = window.Clerk;
            if (!clerk) {
              this._lastError = 'no_clerk_object: SDK loaded but window.Clerk is ' + typeof clerk;
              this._initFailed = true;
              return;
            }
            if (typeof clerk.load === 'function' && !clerk.loaded) {
              await clerk.load();
            }
            this._clerk = clerk;
            if (window.location.pathname === '/sso-callback') {
              try {
                await clerk.handleRedirectCallback({
                  redirectUrl: window.location.origin + "/",
                });
              } catch (cbErr) {
                console.error("SSO callback handling failed:", cbErr);
              }
            }
            this._ready = true;
          } catch (e) {
            console.error("Clerk init failed:", e);
            this._lastError = String(e.message || e);
            this._initFailed = true;
          }
        },
        initFailed() {
          return this._initFailed;
        },
        isSignedIn() {
          if (!this._ready) return false;
          if (this._isNative) return !!localStorage.getItem('__ios_pat');
          return !!this._clerk?.user;
        },
        async getToken() {
          if (!this._ready) return null;
          if (this._isNative) return localStorage.getItem('__ios_pat');
          if (!this._clerk?.session) return null;
          try {
            return await this._clerk.session.getToken();
          } catch (e) {
            console.error("getToken failed:", e);
            return null;
          }
        },
        getUserId() {
          if (!this._ready) return null;
          if (this._isNative) return localStorage.getItem('__ios_user_id');
          return this._clerk?.user?.id || null;
        },
        getUserEmail() {
          if (!this._ready) return null;
          if (this._isNative) return localStorage.getItem('__ios_user_email');
          if (!this._clerk?.user) return null;
          const user = this._clerk.user;
          if (user.primaryEmailAddress && user.primaryEmailAddress.emailAddress) {
            return user.primaryEmailAddress.emailAddress;
          }
          if (Array.isArray(user.emailAddresses) && user.emailAddresses.length > 0) {
            return user.emailAddresses[0].emailAddress || null;
          }
          return null;
        },
        async signOut() {
          if (!this._ready) return;
          if (this._isNative) {
            localStorage.removeItem('__ios_pat');
            localStorage.removeItem('__ios_user_id');
            localStorage.removeItem('__ios_user_email');
            if (this._authListener) this._authListener();
            return;
          }
          if (this._clerk) await this._clerk.signOut();
        },
        async signInWithGoogle() {
          if (!this._ready) return;
          this._lastError = null;

          // ── iOS: OAuth in Safari, exchange for PAT ──
          if (this._isNative) {
            const tauriInvoke =
              window.__TAURI__?.core?.invoke ??
              window.__TAURI_INTERNALS__?.invoke;
            if (!tauriInvoke) {
              this._lastError = 'ios_auth: Tauri invoke not available';
              return null;
            }
            try {
              // Open ios-auth.html in ASWebAuthenticationSession (Safari).
              // Clerk JS runs normally there (cookies work in Safari).
              // After OAuth, the page redirects to our app scheme with a
              // short-lived Clerk session JWT.
              const pk = window.__clerk_publishable_key || '';
              const authUrl = 'https://myintrada.com/ios-auth.html?pk=' + encodeURIComponent(pk);
              const result = await tauriInvoke(
                'plugin:auth-session|open',
                { args: {
                  url: authUrl,
                  callback_scheme: 'com.intrada.app',
                } }
              );

              // Extract the Clerk JWT from the callback URL
              const callbackUrl = new URL(result.callback_url);
              const clerkJwt = callbackUrl.searchParams.get('token');
              if (!clerkJwt) throw new Error('No token in callback');

              // Exchange the short-lived Clerk JWT for a long-lived PAT
              const apiUrl = window.__intrada_api_url || 'https://intrada-api.fly.dev';
              const resp = await fetch(apiUrl + '/api/auth/ios/exchange', {
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + clerkJwt,
                  'Content-Type': 'application/json',
                },
              });
              if (!resp.ok) {
                const body = await resp.text().catch(() => '');
                throw new Error('Exchange failed (' + resp.status + '): ' + body);
              }
              const data = await resp.json();

              // Store PAT and user info for subsequent API calls
              localStorage.setItem('__ios_pat', data.token);
              localStorage.setItem('__ios_user_id', data.user_id);
              if (data.email) localStorage.setItem('__ios_user_email', data.email);

              // Notify the Leptos app that auth state changed
              if (this._authListener) this._authListener();
              return 'ok';
            } catch (e) {
              console.error('iOS auth flow failed:', e);
              if (e && typeof e.message === 'string' && e.message.includes('user cancelled')) {
                return 'cancelled';
              }
              this._lastError = 'ios_auth: ' + (e.message || String(e));
              return null;
            }
          }

          // ── Web: standard Clerk redirect flow ──
          // authenticateWithRedirect resolves its Promise, then the browser
          // starts navigating to Google. Return "redirect" so the caller
          // knows not to show an error in the brief window before unload.
          if (!this._clerk) return null;
          const signIn = this._clerk.client?.signIn;
          if (signIn && typeof signIn.authenticateWithRedirect === 'function') {
            await signIn.authenticateWithRedirect({
              strategy: "oauth_google",
              redirectUrl: window.location.origin + "/sso-callback",
              redirectUrlComplete: window.location.origin + "/",
            });
          } else {
            await this._clerk.redirectToSignIn();
          }
          return 'redirect';
        },
        addListener(callback) {
          if (!this._ready) return;
          if (this._isNative) {
            this._authListener = callback;
            // Invoke immediately with current state (matches Clerk behavior)
            callback();
            return;
          }
          if (this._clerk) this._clerk.addListener(callback);
        },
      };
    </script>
