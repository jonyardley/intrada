[workspace]
members = [
  "crates/intrada-core",
  "crates/intrada-api",
  "crates/intrada-web",
  "crates/intrada-mobile/src-tauri",
  "crates/intrada-mobile/plugins/background-audio",
]
resolver = "2"
package.rust-version = "1.75"

[workspace.dependencies]
crux_core = "0.17.0"
crux_http = "0.16.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ulid = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
