[workspace]
members = ["crates/*"]
resolver = "2"
package.rust-version = "1.75"

[workspace.dependencies]
crux_core = "0.17.0-rc3"
crux_http = "0.16.0-rc3"
facet = { version = "=0.31", features = ["chrono", "ulid"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ulid = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"
