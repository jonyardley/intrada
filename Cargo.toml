[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.dependencies]
crux_core = "0.17.0-rc2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ulid = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
clap = { version = "4.5", features = ["derive"] }
anyhow = "1"
dirs = "5"
