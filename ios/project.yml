name: Intrada
options:
  bundleIdPrefix: com.intrada
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "9S5FG4LQAF"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

# Local Swift packages generated by `just ios-gen` (a build precondition —
# gitignored, never committed). The FFI bridge + the facet-typegen value types.
packages:
  IntradaCoreFFI:
    path: generated/IntradaCoreFFI
  SharedTypes:
    path: generated/SharedTypes

targets:
  Intrada:
    type: application
    platform: iOS
    sources:
      - path: Intrada
    settings:
      base:
        # Distinct from the Tauri app's com.intrada.app so both can coexist on a
        # device during the transition; becomes com.intrada.app at parity.
        PRODUCT_BUNDLE_IDENTIFIER: com.intrada.native
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    dependencies:
      - package: IntradaCoreFFI
        product: IntradaCoreFFI
      - package: SharedTypes
        product: SharedTypes
