name: Intrada
options:
  bundleIdPrefix: com.intrada
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "9S5FG4LQAF"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

# Local packages = generated bindings (a build precondition via `just ios-gen`,
# gitignored). Remote = Sentry (crash reporting) + swift-snapshot-testing (UI
# regression "eyes", test target only).
packages:
  IntradaCoreFFI:
    path: generated/IntradaCoreFFI
  SharedTypes:
    path: generated/SharedTypes
  # Exact-pinned (not `from:`) so SPM can't drift to a newer release on a
  # cache-miss resolve — snapshot references are renderer-specific, and
  # swift-snapshot-testing's version is part of that renderer. Bump deliberately
  # (edit the version here + re-record snapshots if the renderer changed).
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    exactVersion: "8.58.3"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    exactVersion: "1.19.2"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: "7.11.0"

targets:
  Intrada:
    type: application
    platform: iOS
    sources:
      - path: Intrada
    settings:
      base:
        # Distinct from the Tauri app's com.intrada.app so both can coexist on a
        # device during the transition; becomes com.intrada.app at parity.
        PRODUCT_BUNDLE_IDENTIFIER: com.intrada.native
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # Custom Info.plist keys (SENTRY_DSN) are dropped by GENERATE_INFOPLIST_FILE —
        # it only injects Apple-recognised INFOPLIST_KEY_* — so they go through this
        # partial plist, which the build system merges with the generated keys.
        INFOPLIST_FILE: Intrada/Info.plist
        # xcodegen expands ${...} from the env (justfile `set dotenv-load` feeds .env);
        # the plist's $(SENTRY_DSN) resolves this at build. Unset → empty → the
        # hasPrefix("https://") start gate keeps Sentry off (CI). intrada-mobile project.
        SENTRY_DSN: "${SENTRY_DSN_NATIVE}"
    dependencies:
      - package: IntradaCoreFFI
        product: IntradaCoreFFI
      - package: SharedTypes
        product: SharedTypes
      - package: Sentry
        product: Sentry
      - package: Sentry
        product: SentrySwiftUI
      - package: GRDB
        product: GRDB
    scheme:
      testTargets:
        - IntradaTests
        - IntradaUITests

  IntradaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: IntradaUITests
    dependencies:
      - target: Intrada

  IntradaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IntradaTests
        # Reference snapshots are read from disk at runtime (via #file), not
        # bundled — keep them out of the target's build inputs/resources.
        excludes:
          - "__Snapshots__/**"
    dependencies:
      - target: Intrada
      - package: SnapshotTesting
        product: SnapshotTesting
      - package: SharedTypes
        product: SharedTypes
      - package: IntradaCoreFFI
        product: IntradaCoreFFI

# Extra scheme for Cmd+R against the demo dataset (the 6 sample pieces +
# practice history). Pick "Intrada (Seeded)" from Xcode's scheme dropdown to
# develop against populated content before add/edit exists; the default
# "Intrada" scheme runs local-first against real on-device data. The arg is the
# same one `just ios-run`'s SEED passes on the headless path. Selection persists
# across `just ios` regenerations (it lives in xcuserdata, untouched by xcodegen).
schemes:
  Intrada (Seeded):
    build:
      targets:
        Intrada: all
    run:
      commandLineArguments:
        "--seed-sample-data": true
