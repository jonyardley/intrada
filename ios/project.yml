name: Intrada
options:
  bundleIdPrefix: com.intrada
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: "9S5FG4LQAF"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

# Local packages = generated bindings (a build precondition via `just ios-gen`,
# gitignored). Remote = Sentry (crash reporting) + swift-snapshot-testing (UI
# regression "eyes", test target only).
packages:
  IntradaCoreFFI:
    path: generated/IntradaCoreFFI
  SharedTypes:
    path: generated/SharedTypes
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.18.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

targets:
  Intrada:
    type: application
    platform: iOS
    sources:
      - path: Intrada
    settings:
      base:
        # Distinct from the Tauri app's com.intrada.app so both can coexist on a
        # device during the transition; becomes com.intrada.app at parity.
        PRODUCT_BUNDLE_IDENTIFIER: com.intrada.native
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # Empty in dev/CI → Sentry stays disabled (no DSN). Set per-build/env.
        INFOPLIST_KEY_SENTRY_DSN: ""
    dependencies:
      - package: IntradaCoreFFI
        product: IntradaCoreFFI
      - package: SharedTypes
        product: SharedTypes
      - package: Sentry
        product: Sentry
      - package: GRDB
        product: GRDB
    scheme:
      testTargets:
        - IntradaTests

  IntradaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IntradaTests
        # Reference snapshots are read from disk at runtime (via #file), not
        # bundled — keep them out of the target's build inputs/resources.
        excludes:
          - "__Snapshots__/**"
    dependencies:
      - target: Intrada
      - package: SnapshotTesting
        product: SnapshotTesting
      - package: SharedTypes
        product: SharedTypes
      - package: IntradaCoreFFI
        product: IntradaCoreFFI
