name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of target branch — stacked PRs (where the
  # target is a feature branch, not main) need CI too. Without this filter
  # the workflow only triggers when the target is `main`, leaving stacked
  # PRs with "no checks reported" until they're rebased onto main.
  pull_request:

# Cancel in-flight runs when a new commit lands on the same PR. Don't cancel
# main-branch runs — those gate deploys, so we want every commit's build to
# complete and produce its own deploy.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUST_VERSION: "1.89.0"
  SENTRY_ORG: jon-yardley

jobs:
  # Detects which paths changed in the PR — used to skip jobs whose inputs
  # haven't changed. Always-true on main pushes (so deploys see every job).
  # Runs cheaply (~5s) on every event.
  changes:
    name: Path Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile-plugins: ${{ steps.filter.outputs.mobile-plugins }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'Dockerfile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/intrada-api/**'
              - 'crates/intrada-core/**'
              - '.github/workflows/ci.yml'
            web:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/intrada-web/**'
              - 'crates/intrada-core/**'
              - 'e2e/**'
              - '.github/workflows/ci.yml'
            mobile-plugins:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/intrada-mobile/plugins/**'
              - '.github/workflows/ci.yml'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "native"
      # nextest runs the same assertions as `cargo test` but with a smarter
      # scheduler — typically 40–50% faster. Doc tests are run separately
      # below since nextest doesn't execute them.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      # intrada-mobile + its plugins (Tauri 2) require GTK/glib system libs
      # not present on Ubuntu runners — iOS-only crates with no meaningful
      # unit tests on Linux.
      - run: cargo nextest run --workspace --exclude intrada-mobile --exclude tauri-plugin-background-audio --exclude tauri-plugin-live-activity
      - name: Doc tests
        run: cargo test --doc --workspace --exclude intrada-mobile --exclude tauri-plugin-background-audio --exclude tauri-plugin-live-activity

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "native"
          save-if: "false"
      # intrada-mobile + its plugins excluded: Tauri 2 needs GTK/glib system libs on Linux.
      - run: cargo clippy --workspace --exclude intrada-mobile --exclude tauri-plugin-background-audio --exclude tauri-plugin-live-activity -- -D warnings
      - name: Clippy (WASM target)
        run: cargo clippy --target wasm32-unknown-unknown -p intrada-web -- -D warnings

  ios-clippy:
    # Lints iOS-only branches inside the Tauri plugins. Linux runners
    # can't compile these (Tauri 2 pulls in glib/GTK system libs that
    # the Ubuntu base image doesn't have), so they're --excluded from
    # the main clippy job above. That left `#[cfg(target_os = "ios")]`
    # branches with zero CI coverage — a stale `needless_return` or
    # unused-import inside an iOS-only block would slip past every PR
    # and only fail the next time someone ran `just ios-build` locally.
    #
    # macos-latest is ~10x the per-minute cost of Linux runners, so this
    # job is path-filtered: it only runs on PRs that actually touch
    # `crates/intrada-mobile/plugins/**` (or workspace Cargo files /
    # this workflow). Always runs on main pushes regardless. Tracks #497.
    name: iOS Clippy (Tauri plugins)
    runs-on: macos-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.mobile-plugins == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
          # Device target is enough — simulator targets (x86_64-apple-ios,
          # aarch64-apple-ios-sim) don't add coverage clippy doesn't already
          # get from the device target. Mirrors CLAUDE.md's recommendation.
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
        with:
          # Separate cache key from native/wasm jobs — different target
          # triple, different sysroot, different cached artefacts. No
          # other job populates this cache, so we let it save (the other
          # clippy job uses save-if:false because `test` populates the
          # native cache).
          prefix-key: "ios"
      - run: cargo clippy -p tauri-plugin-background-audio --target aarch64-apple-ios -- -D warnings
      - run: cargo clippy -p tauri-plugin-live-activity --target aarch64-apple-ios -- -D warnings

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "wasm"
          cache-on-failure: true
      - uses: jetli/trunk-action@v0.5.1
      # Tailwind v4 standalone binary doesn't change between runs — cache it.
      - name: Cache Tailwind CSS binary
        id: tailwind-cache
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/tailwindcss
          key: tailwindcss-v4.1.18-linux-x64
      - name: Install Tailwind CSS v4 standalone CLI
        if: steps.tailwind-cache.outputs.cache-hit != 'true'
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v4.1.18/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
      - name: Build WASM (release)
        working-directory: crates/intrada-web
        env:
          INTRADA_API_URL: https://intrada-api.fly.dev
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: trunk build --release
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: crates/intrada-web/dist/
          retention-days: 1

  wasm-test:
    name: WASM Tests
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "wasm"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Run WASM tests
        working-directory: crates/intrada-web
        run: wasm-pack test --headless --chrome -- --test wasm

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json
      - name: Download web-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web-dist
      - name: Install dependencies
        working-directory: e2e
        run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e/package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install chromium
      - name: Run E2E tests
        working-directory: e2e
        env:
          DIST_DIR: ${{ github.workspace }}/web-dist
        run: npx playwright test

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Cache the RustSec advisory database to avoid re-cloning ~50MB on
      # every run. Stale-OK: cargo-audit fetches incrementally on top.
      - name: Cache advisory database
        uses: actions/cache@v5
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ github.run_id }}
          restore-keys: advisory-db-
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      # Reads ignore list from .cargo/audit.toml — each entry must have a
      # tracking issue and rationale comment. Anything new fails CI.
      - run: cargo audit

  api-docker-build:
    # Catches Dockerfile / workspace-scoping bugs on PRs that would otherwise
    # only surface when the Deploy API job runs on main. Only runs when paths
    # that could affect the build change — most PRs (frontend/iOS only) skip
    # this and stay fast. Always runs on main pushes (gates deploy).
    #
    # On main pushes the resulting image is pushed to Fly's registry tagged
    # with the commit SHA, and `deploy-api` deploys that image instead of
    # rebuilding from scratch on Fly's remote builder. PRs build with cache
    # but don't push.
    name: API Docker Build
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to Fly registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}
      - name: Build intrada-api image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: registry.fly.io/intrada-api:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [test, clippy, fmt, wasm-build, wasm-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Download web-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: crates/intrada-web/dist
      # Inject Sentry DebugIds into JS + WASM artifacts BEFORE wrangler
      # publish, so the deployed files match the artifacts uploaded by
      # action-release later. DebugIds let Sentry symbolicate stack frames
      # without relying on filename-based source-map lookup (which breaks
      # under content-hashed filenames or strict CSP). #485.
      #
      # Skipped when SENTRY_AUTH_TOKEN is unset — still want deploys to
      # succeed for the rare case the token is rotated mid-deploy.
      - name: Inject Sentry DebugIds into dist
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npx --yes @sentry/cli@latest sourcemaps inject crates/intrada-web/dist
      # Inject the release id into the prebuilt index.html before publishing.
      # The placeholder is set in the source — this swap only happens in the
      # main-branch deploy path, so PR builds keep `release: undefined`.
      - name: Inject Sentry release into index.html
        run: |
          sed -i "s|__SENTRY_RELEASE_PLACEHOLDER__|${{ github.sha }}|g" crates/intrada-web/dist/index.html
          grep -q "${{ github.sha }}" crates/intrada-web/dist/index.html
      # Recompute SHA-384 integrity hashes in index.html after the steps
      # above. `sentry-cli sourcemaps inject` modifies JS files in place
      # to add DebugId snippets, which invalidates the integrity hashes
      # Trunk computed at build time. Without this step the browser
      # rejects every modified resource:
      #   "Failed to find a valid digest in the 'integrity' attribute …
      #    The resource has been blocked."
      # and the page renders blank. (Production blank-page incident
      # 2026-05-09 hit exactly this.)
      #
      # Walks every <link>/<script integrity=...> and replaces the hash
      # with whatever the on-disk file currently hashes to. Files whose
      # contents weren't touched (CSS, WASM) get their hashes
      # recomputed too — same value, no-op.
      - name: Refresh SRI integrity hashes after inject
        run: |
          python3 - <<'PY'
          import base64, hashlib, pathlib, re

          dist = pathlib.Path("crates/intrada-web/dist")
          index = dist / "index.html"
          html = index.read_text()
          tag_re = re.compile(
              r'<(?:link|script)\b[^>]*\bintegrity="sha384-[^"]+"[^>]*>', re.I
          )
          src_re = re.compile(r'(?:href|src)="(/?[^"#?]+)"', re.I)


          def patch(m):
              tag = m.group(0)
              src = src_re.search(tag)
              if not src:
                  return tag
              rel = src.group(1).lstrip("/")
              file = dist / rel
              if not file.is_file():
                  return tag
              digest = base64.b64encode(
                  hashlib.sha384(file.read_bytes()).digest()
              ).decode()
              return re.sub(
                  r'integrity="sha384-[^"]+"',
                  f'integrity="sha384-{digest}"',
                  tag,
              )


          new_html, count = tag_re.subn(patch, html)
          if new_html != html:
              index.write_text(new_html)
              print(f"refreshed {count} integrity hashes")
          PY
      # Belt-and-braces: read index.html back and assert every
      # integrity hash matches the on-disk file it references. Catches
      # the scenario where someone adds a NEW step that modifies dist/
      # files between this point and wrangler publish (or removes the
      # recompute step above) — fails the deploy loud rather than
      # shipping a blank page like 2026-05-09. Same Python pattern as
      # the recompute, just assertion-only.
      - name: Verify SRI integrity hashes match on-disk files
        run: |
          python3 - <<'PY'
          import base64, hashlib, pathlib, re, sys

          dist = pathlib.Path("crates/intrada-web/dist")
          html = (dist / "index.html").read_text()
          tag_re = re.compile(
              r'<(?:link|script)\b[^>]*\bintegrity="sha384-([^"]+)"[^>]*>', re.I
          )
          src_re = re.compile(r'(?:href|src)="(/?[^"#?]+)"', re.I)

          mismatches = []
          checked = 0
          for m in tag_re.finditer(html):
              declared = m.group(1)
              src = src_re.search(m.group(0))
              if not src:
                  continue
              file = dist / src.group(1).lstrip("/")
              if not file.is_file():
                  mismatches.append(
                      f"  {src.group(1)}: referenced but not on disk"
                  )
                  continue
              actual = base64.b64encode(
                  hashlib.sha384(file.read_bytes()).digest()
              ).decode()
              if declared != actual:
                  mismatches.append(
                      f"  {src.group(1)}: declared sha384-{declared[:12]}…, "
                      f"actual sha384-{actual[:12]}…"
                  )
              checked += 1

          if mismatches:
              print("SRI integrity mismatch — would ship a blank page:")
              for line in mismatches:
                  print(line)
              print(
                  "\nLikely cause: a CI step modified dist/ between the "
                  "recompute step and this verify step. Either move it "
                  "BEFORE the recompute, or extend the recompute step "
                  "to run after it."
              )
              sys.exit(1)
          print(f"verified {checked} integrity hashes match on-disk files")
          PY
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      # Tag the release in Sentry + upload sourcemaps once Cloudflare has
      # the build. The `sourcemaps:` input re-runs `sentry-cli sourcemaps
      # inject` (idempotent — DebugIds are content-deterministic) and then
      # uploads the artifact bundle. Failure here shouldn't block a
      # successful deploy, so continue-on-error.
      - name: Create Sentry release (intrada-web) + upload sourcemaps
        if: env.SENTRY_AUTH_TOKEN != ''
        continue-on-error: true
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_PROJECT: intrada-web
        with:
          environment: production
          version: ${{ github.sha }}
          set_commits: auto
          finalize: true
          sourcemaps: ./crates/intrada-web/dist

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: [test, clippy, fmt, wasm-build, wasm-test, e2e, api-docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Deploy the image already built, tested (via api-docker-build's gate)
      # and pushed to Fly's registry — no rebuild on Fly's remote builder.
      # GIT_SHA was baked in at CI build time via the GIT_SHA build-arg.
      - run: flyctl deploy --image registry.fly.io/intrada-api:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Create Sentry release (intrada-api)
        if: env.SENTRY_AUTH_TOKEN != ''
        continue-on-error: true
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_PROJECT: intrada-api
        with:
          environment: production
          version: ${{ github.sha }}
          set_commits: auto
          finalize: true
