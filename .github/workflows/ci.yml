name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of target branch — stacked PRs (where the
  # target is a feature branch, not main) need CI too. Without this filter
  # the workflow only triggers when the target is `main`, leaving stacked
  # PRs with "no checks reported" until they're rebased onto main.
  pull_request:

# Cancel in-flight runs when a new commit lands on the same PR. Don't cancel
# main-branch runs — those gate deploys, so we want every commit's build to
# complete and produce its own deploy.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

env:
  RUST_VERSION: "1.90.0"
  SENTRY_ORG: jon-yardley

jobs:
  # Detects which paths changed in the PR — used to skip jobs whose inputs
  # haven't changed. Always-true on main pushes (so deploys see every job).
  # Runs cheaply (~5s) on every event.
  changes:
    name: Path Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      api: ${{ steps.filter.outputs.api }}
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/**'
              - '.github/workflows/ci.yml'
            api:
              - 'Dockerfile'
              - 'crates/intrada-api/**'
              - '.github/workflows/ci.yml'
            native:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/intrada-core/**'
              - 'crates/intrada-ffi/**'
              - 'ios/**'
              - 'scripts/ios-run-sim.sh'
              - 'justfile'
              - '.github/workflows/ci.yml'

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "native"
          cache-on-failure: true
      # nextest runs the same assertions as `cargo test` but with a smarter
      # scheduler — typically 40–50% faster. Doc tests are run separately
      # below since nextest doesn't execute them.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --profile ci
      - name: Doc tests
        run: cargo test --doc --workspace
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: Unit Test Results
          path: target/nextest/ci/junit.xml
          reporter: java-junit
          fail-on-error: false

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "coverage"
          cache-on-failure: true
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Generate coverage
        run: >
          cargo llvm-cov nextest
          --workspace
          --codecov
          --output-path codecov.json
      - name: Upload to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: codecov.json
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "native"
          save-if: "false"
      - uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif,sarif-fmt
      # Run clippy with JSON output piped through clippy-sarif for GitHub
      # code scanning annotations, then check the exit code to fail the job.
      # --all-targets so test/bench code is linted too, not just lib/bin — a
      # dropped `#[must_use]` Command shipped in a test once because the gate
      # stopped at lib targets.
      - name: Clippy (native)
        shell: bash
        run: |
          set +o pipefail
          cargo clippy --workspace --all-targets \
            --message-format=json -- -D warnings 2>&1 \
            | clippy-sarif | tee clippy-native.sarif | sarif-fmt
          exit ${PIPESTATUS[0]}
      - name: Upload Clippy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: clippy-native.sarif
          category: clippy-native
          wait-for-processing: true

  native-ios:
    # Native SwiftUI app — regenerate bindings (facet typegen + cargo-swift),
    # build, and run the snapshot test. Pinned to macos-26 + Xcode 26.5 so the
    # toolchain matches local dev (and the spec's iOS 26 SDK): SwiftUI snapshots
    # are renderer-specific, so dev and CI MUST share Xcode/iOS.
    #
    # PR optimisations (vs main): the launch+screenshot smoke is skipped (the
    # snapshot test is the regression gate) and DerivedData is restore-only.
    # Main runs the full launch+screenshot and writes the cache.
    name: Native iOS (build + test)
    runs-on: macos-26
    timeout-minutes: 40
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.native == 'true'
    steps:
      - uses: actions/checkout@v7
      # Pin Xcode 26.5 to match local dev + the recorded snapshot reference.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.5"
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      # Swift formatting gate (mirror of cargo fmt --check). Needs only the
      # Xcode toolchain, so it runs first and fails fast. The version print
      # diagnoses formatter-default drift between the Xcode pin and local dev.
      - name: swift format check
        run: |
          swift format --version
          just ios-fmt-check
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "native-ios"
          cache-on-failure: true
      # dtolnay/rust-toolchain skips adding ~/.cargo/bin to PATH on the macOS
      # image; without this `cargo` resolves to Apple's stub. (See ios-build.)
      - name: Ensure cargo is on PATH
        run: |
          echo "$CARGO_HOME/bin" >> $GITHUB_PATH
          cargo --version
      # iOS-only `#[cfg(target_os = "ios")]` branches in the FFI crate can't be
      # linted by the Linux `clippy` job (no Apple SDK); lint them here against
      # the device target. Runs before the expensive build so it fails fast.
      - name: Clippy (iOS device target)
        run: cargo clippy -p intrada-ffi --target aarch64-apple-ios -- -D warnings
      - name: Cache cargo-swift
        id: cargo-swift-cache
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/cargo-swift
          key: cargo-swift-0.9.0-${{ runner.os }}-${{ runner.arch }}
      # Pinned to 0.9.0: its bundled uniffi-bindgen matches our uniffi=0.29.4
      # crate's runtime contract version (the combo the crux example uses).
      # Newer cargo-swift bundles a different bindgen → runtime contract
      # mismatch crash. Bump this WITH the uniffi crate, in lockstep.
      - name: Install cargo-swift
        if: steps.cargo-swift-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-swift --version "=0.9.0" --locked
      - name: Cache Homebrew packages
        id: brew-cache
        uses: actions/cache@v6
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-xcodegen-${{ runner.os }}-${{ runner.arch }}
      - name: Install xcodegen
        run: brew install xcodegen
      # The generated bindings (ios/generated: cargo-swift's IntradaCoreFFI
      # xcframework + facet's SharedTypes) are a pure function of the core/ffi
      # source, the locked dep versions (uniffi/crux contract — Cargo.lock), and
      # the cargo-swift version. So we cache them and only regenerate on a miss:
      # a Swift-only PR (touches ios/**, not the core) gets an exact hit and
      # skips the ~28s regen. The key MUST capture everything the output depends
      # on — a stale hit here is a uniffi/crux contract mismatch that crashes the
      # app at runtime (the failure mode CLAUDE.md warns about). Bump the
      # `cargoswift-0.9.0` token in lockstep with the `Install cargo-swift`
      # version pin above.
      - name: Cache generated Swift bindings
        id: bindings-cache
        uses: actions/cache@v6
        with:
          path: ios/generated
          key: ios-bindings-cargoswift-0.9.0-${{ runner.os }}-${{ hashFiles('crates/intrada-core/src/**', 'crates/intrada-ffi/src/**', 'crates/intrada-core/Cargo.toml', 'crates/intrada-ffi/Cargo.toml', 'Cargo.lock') }}
      - name: Regenerate Swift bindings (facet typegen + cargo-swift)
        if: steps.bindings-cache.outputs.cache-hit != 'true'
        run: just ios-gen
      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate
      # Resolved SwiftPM package sources (Sentry, swift-snapshot-testing + its
      # heavy swift-syntax dep, GRDB) get their own cache keyed on project.yml —
      # where the version constraints are declared, so it changes rarely and is a
      # near-guaranteed hit. This removes the network re-resolve/re-clone that
      # drove the snapshot-step run-to-run variance (#813). Relocated out of
      # DerivedData via `-clonedSourcePackagesDirPath build/spm` (in the snapshot
      # step below) so this cache and the DerivedData cache never overlap on the
      # same path. Stable sources also make Xcode's incremental check on the
      # restored DerivedData a no-op, so the compiled deps get reused instead of
      # rebuilt. Saved on all events (key is content-addressed by project.yml;
      # concurrent writers no-op once the key exists).
      - name: Cache SwiftPM packages
        uses: actions/cache@v6
        with:
          path: ios/build/spm
          key: ios-spm-v1-${{ runner.os }}-${{ hashFiles('ios/project.yml') }}
          restore-keys: |
            ios-spm-v1-${{ runner.os }}-
      # Cache DerivedData (compiled SwiftPM dep products + build intermediates;
      # the resolved package *sources* are cached separately above) so
      # `xcodebuild test` rebuilds incrementally instead of recompiling the whole
      # dependency tree every run. derivedDataPath is the stable relative
      # `build/dd`, so cached absolute paths line up across runs. The exact key
      # rarely hits (Swift source changes per PR); the restore-key pulls the most
      # recent DerivedData and Xcode rebuilds only what changed. Safe for snapshot
      # determinism: this caches compilation only — rendering happens at runtime
      # in the simulator, so a cache hit can't alter a snapshot result (a stale
      # incremental build fails loud, it can't silently pass). Bump the key prefix
      # to force-evict.
      - name: Cache iOS DerivedData
        uses: actions/cache@v6
        with:
          path: ios/build/dd
          key: ios-dd-v2-${{ runner.os }}-${{ hashFiles('ios/project.yml', 'ios/Intrada/**', 'ios/IntradaTests/**') }}
          restore-keys: |
            ios-dd-v2-${{ runner.os }}-
          # Only main writes the cache (~66s). PRs restore main's DerivedData —
          # which already holds the costly SwiftPM deps (Sentry, swift-syntax,
          # swift-snapshot-testing) — and skip the write. The exact-key on main
          # tracks `main`'s own source, so PR incremental builds stay warm.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      # Snapshot test = deterministic UI-regression "eyes" (renders RootView
      # against a committed reference). Create a deterministic iOS 26.5 sim —
      # the reference is recorded on iOS 26.5 / Xcode 26.5 (= local dev), and
      # SwiftUI snapshots are renderer-specific. Bump (here + the reference)
      # when local dev moves to a newer Xcode/iOS.
      - name: Run snapshot tests
        working-directory: ios
        run: |
          UDID=$(xcrun simctl create snap-26-5 "iPhone 16" "iOS26.5")
          test -n "$UDID" || { echo '::error::could not create iOS 26.5 simulator'; exit 1; }
          # COMPILER_INDEX_STORE_ENABLE=NO skips building the IDE code-navigation
          # index store — pure dead weight in CI (nothing reads it). -quiet trims
          # the per-file build log noise.
          xcodebuild test -project Intrada.xcodeproj -scheme Intrada -sdk iphonesimulator \
            -destination "id=$UDID" -derivedDataPath build/dd \
            -clonedSourcePackagesDirPath build/spm -quiet \
            COMPILER_INDEX_STORE_ENABLE=NO CODE_SIGNING_ALLOWED=NO
      - name: Upload snapshot failures
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-failures
          path: ios/IntradaTests/__Snapshots__/
          retention-days: 7
          if-no-files-found: ignore
      # REUSE_BUILD: the snapshot-test step above already built the app into
      # build/dd — install + launch it for the screenshot without rebuilding.
      # Main only (~105s): the snapshot test is the per-PR UI regression gate;
      # the launch+screenshot is a "does the real app boot through its FFI
      # entry point" smoke + visual artifact, which only main needs.
      - name: Launch on simulator + screenshot
        if: github.event_name == 'push'
        run: REUSE_BUILD=1 bash scripts/ios-run-sim.sh "$GITHUB_WORKSPACE/ios-screenshots/native.png"
      - name: Upload screenshot
        if: always() && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: native-ios-screenshot
          path: ios-screenshots/
          retention-days: 7
          if-no-files-found: ignore

  # Cheap (<5s, no macOS) guard that keeps the snapshot-reference suite from
  # bloating git history: every PNG must map to a current test (no orphans) and
  # stay under the size ceiling (catches un-optimized references — Xcode writes a
  # redundant alpha channel; `just ios-snapshots-optimize` strips it). See
  # CLAUDE.md -> "Snapshot test hygiene".
  snapshot-hygiene:
    name: Snapshot Hygiene
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.native == 'true'
    steps:
      - uses: actions/checkout@v7
      - name: Check snapshot references (orphans + size ceiling)
        run: bash scripts/check-snapshots.sh

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  # The same comment-density gate as the local pre-push hook, enforced for
  # everyone — an opt-in hook is effectively off (CLAUDE.md "stated invariant =
  # enforced invariant"). HEAD is detached on a PR checkout, so the base branch
  # is passed explicitly via COMMENT_CHECK_BASE.
  comment-density:
    name: Comment density
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check comment density
        env:
          COMMENT_CHECK_BASE: origin/${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$GITHUB_BASE_REF"
          bash scripts/check-comment-density.sh

  security:
    name: Security & hygiene (cargo-deny, Gitleaks, typos, cargo-shear)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Pinned: typos dictionary updates can start flagging previously-clean
      # words, failing unrelated PRs. Bump deliberately, with mise.toml.
      - uses: taiki-e/install-action@v2
        with:
          tool: typos@1.48,cargo-shear@1.13
      # ── typos ──────────────────────────────────────────────────────────
      # Source-tree spell check (docs-heavy repo; also catches identifier
      # typos clippy/swift-format never will). Project words: _typos.toml.
      # Runs BEFORE gitleaks: that action writes results.sarif into the
      # workspace and typos would flag words inside the generated file.
      - name: Spell check (typos)
        run: typos
      # ── cargo-shear ────────────────────────────────────────────────────
      # Unused workspace dependencies — catches dead deps that inflate CI builds.
      - name: Unused dependencies (cargo-shear)
        run: cargo-shear
      # ── cargo-deny ─────────────────────────────────────────────────────
      # Replaces cargo-audit. Checks advisories (same RustSec DB), license
      # compliance, crate bans, and source restrictions in one pass.
      # Config: deny.toml. Ignore list migrated from .cargo/audit.toml.
      - uses: EmbarkStudios/cargo-deny-action@v2
      # ── Gitleaks ───────────────────────────────────────────────────────
      # Scans for leaked secrets (API keys, tokens, credentials) in the
      # diff. ~150 built-in regex patterns, runs in seconds.
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api-docker-build:
    # Catches Dockerfile / API-specific build bugs on PRs. Narrowly filtered
    # to Dockerfile + intrada-api crate only — Cargo.toml, Cargo.lock, and
    # intrada-core changes are already validated by test/clippy jobs, so they
    # don't need an ~8 min Docker build. Always runs on main pushes (gates
    # deploy).
    #
    # On main pushes the resulting image is pushed to Fly's registry tagged
    # with the commit SHA, and `deploy-api` deploys that image instead of
    # rebuilding from scratch on Fly's remote builder. PRs build with cache
    # but don't push.
    name: API Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: changes
    # iOS-pivot focus mode: API on hold — never runs on PRs. On main, only runs
    # when the API actually changed (Dockerfile / intrada-api / ci.yml). When it
    # didn't, this job skips → `deploy-api` (which lists it in `needs`) skips too,
    # so we don't rebuild + redeploy an unchanged image on every unrelated main
    # push. The previously-deployed API keeps running.
    if: github.event_name == 'push' && needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Log in to Fly registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}
      - name: Build intrada-api image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: registry.fly.io/intrada-api:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    # api-docker-build only runs on main when the API changed; when it skips,
    # this job skips with it (so an unchanged API isn't needlessly redeployed).
    needs: [test, clippy, fmt, api-docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # Deploy the image already built, tested (via api-docker-build's gate)
      # and pushed to Fly's registry — no rebuild on Fly's remote builder.
      # GIT_SHA was baked in at CI build time via the GIT_SHA build-arg.
      - run: flyctl deploy --image registry.fly.io/intrada-api:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Create Sentry release (intrada-api)
        if: env.SENTRY_AUTH_TOKEN != ''
        continue-on-error: true
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_PROJECT: intrada-api
        with:
          environment: production
          version: ${{ github.sha }}
          set_commits: auto
          finalize: true
