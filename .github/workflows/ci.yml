name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new commit lands on the same PR. Don't cancel
# main-branch runs — those gate deploys, so we want every commit's build to
# complete and produce its own deploy.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUST_VERSION: "1.89.0"

jobs:
  # Detects which paths changed in the PR — used to skip jobs whose inputs
  # haven't changed. Always-true on main pushes (so deploys see every job).
  # Runs cheaply (~5s) on every event.
  changes:
    name: Path Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            api:
              - 'Dockerfile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/intrada-api/**'
              - 'crates/intrada-core/**'
              - '.github/workflows/ci.yml'
            web:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'crates/intrada-web/**'
              - 'crates/intrada-core/**'
              - 'e2e/**'
              - '.github/workflows/ci.yml'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "native"
      # nextest runs the same assertions as `cargo test` but with a smarter
      # scheduler — typically 40–50% faster. Doc tests are run separately
      # below since nextest doesn't execute them.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      # intrada-mobile (Tauri 2) requires GTK/glib system libs not present on
      # Ubuntu runners — it's an iOS-only host with no meaningful unit tests.
      - run: cargo nextest run --workspace --exclude intrada-mobile
      - name: Doc tests
        run: cargo test --doc --workspace --exclude intrada-mobile

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "native"
          save-if: "false"
      # intrada-mobile excluded: Tauri 2 needs GTK/glib system libs on Linux.
      - run: cargo clippy --workspace --exclude intrada-mobile -- -D warnings
      - name: Clippy (WASM target)
        run: cargo clippy --target wasm32-unknown-unknown -p intrada-web -- -D warnings

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "wasm"
          cache-on-failure: true
      - uses: jetli/trunk-action@v0.5.1
      # Tailwind v4 standalone binary doesn't change between runs — cache it.
      - name: Cache Tailwind CSS binary
        id: tailwind-cache
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/tailwindcss
          key: tailwindcss-v4.1.18-linux-x64
      - name: Install Tailwind CSS v4 standalone CLI
        if: steps.tailwind-cache.outputs.cache-hit != 'true'
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v4.1.18/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
      - name: Build WASM (release)
        working-directory: crates/intrada-web
        env:
          INTRADA_API_URL: https://intrada-api.fly.dev
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: trunk build --release
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: crates/intrada-web/dist/
          retention-days: 1

  wasm-test:
    name: WASM Tests
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "wasm"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Run WASM tests
        working-directory: crates/intrada-web
        run: wasm-pack test --headless --chrome -- --test wasm

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json
      - name: Download web-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web-dist
      - name: Install dependencies
        working-directory: e2e
        run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e/package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install chromium
      - name: Run E2E tests
        working-directory: e2e
        env:
          DIST_DIR: ${{ github.workspace }}/web-dist
        run: npx playwright test

  typegen:
    name: Typegen Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "native"
          save-if: "false"
      - name: Generate Swift types from Rust sources
        run: cargo build -p shared_types

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  api-docker-build:
    # Catches Dockerfile / workspace-scoping bugs on PRs that would otherwise
    # only surface when the Deploy API job runs on main. Only runs when paths
    # that could affect the build change — most PRs (frontend/iOS only) skip
    # this and stay fast. Always runs on main pushes (gates deploy).
    name: API Docker Build
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build intrada-api image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: intrada-api:ci-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [test, clippy, fmt, typegen, wasm-build, wasm-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Download web-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: crates/intrada-web/dist
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: [test, clippy, fmt, typegen, wasm-build, wasm-test, e2e, api-docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
