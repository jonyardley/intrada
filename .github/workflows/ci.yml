name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  RUST_VERSION: "1.89.0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "native-v3"
      # intrada-mobile (Tauri 2) requires GTK/glib system libs not present on
      # Ubuntu runners — it's an iOS-only host with no meaningful unit tests.
      - run: cargo test --workspace --exclude intrada-mobile

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "native-v3"
          save-if: "false"
      # intrada-mobile excluded: Tauri 2 needs GTK/glib system libs on Linux.
      - run: cargo clippy --workspace --exclude intrada-mobile -- -D warnings
      - name: Clippy (WASM target)
        run: cargo clippy --target wasm32-unknown-unknown -p intrada-web -- -D warnings

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wasm"
          cache-on-failure: true
      - uses: jetli/trunk-action@v0.5.1
      - name: Install Tailwind CSS v4 standalone CLI
        run: |
          curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/v4.1.18/tailwindcss-linux-x64
          chmod +x tailwindcss-linux-x64
          mv tailwindcss-linux-x64 /usr/local/bin/tailwindcss
      - name: Force rebuild when env vars change
        run: touch crates/intrada-web/src/clerk_bindings.rs
      - name: Build WASM (release)
        working-directory: crates/intrada-web
        env:
          INTRADA_API_URL: https://intrada-api.fly.dev
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: trunk build --release
      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: crates/intrada-web/dist/
          retention-days: 1

  wasm-test:
    name: WASM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "wasm"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Run WASM tests
        working-directory: crates/intrada-web
        run: wasm-pack test --headless --chrome -- --test wasm

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json
      - name: Download web-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: web-dist
      - name: Install dependencies
        working-directory: e2e
        run: npm ci
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e/package-lock.json') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: e2e
        run: npx playwright install chromium
      - name: Run E2E tests
        working-directory: e2e
        env:
          DIST_DIR: ${{ github.workspace }}/web-dist
        run: npx playwright test

  typegen:
    name: Typegen Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "native-v3"
          save-if: "false"
      - name: Generate Swift types from Rust sources
        run: cargo build -p shared_types

  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [test, clippy, fmt, typegen, wasm-build, wasm-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Download web-dist artifact
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: crates/intrada-web/dist
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: [test, clippy, fmt, typegen, wasm-build, wasm-test, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
