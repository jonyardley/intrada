name: iOS

on:
  push:
    branches: [main]
    paths:
      - "crates/intrada-core/**"
      - "crates/shared/**"
      - "crates/shared_types/**"
      - "ios/**"
      - "scripts/build-ios.sh"
      - ".github/workflows/ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/intrada-core/**"
      - "crates/shared/**"
      - "crates/shared_types/**"
      - "ios/**"
      - "scripts/build-ios.sh"
      - ".github/workflows/ios.yml"

env:
  RUST_VERSION: "1.89.0"
  # Xcode 16.2 ships with the iOS 18.2 platform on macos-14 runners.
  # macOS 15 (Sequoia) requires a separate multi-GB platform download for
  # all Xcode versions, so we use macos-14 for the Xcode build step.
  XCODE_VERSION: "16.2"

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Build Rust static library for iOS targets
  # ─────────────────────────────────────────────
  build-rust:
    name: Build Rust (iOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ios"
          cache-on-failure: true

      - name: Build shared crate for simulator
        run: cargo build -p shared --features uniffi --release --target aarch64-apple-ios-sim

      - name: Build shared crate for device
        run: cargo build -p shared --features uniffi --release --target aarch64-apple-ios

      - name: Upload simulator library
        uses: actions/upload-artifact@v7
        with:
          name: rust-ios-sim-lib
          path: target/aarch64-apple-ios-sim/release/libshared.a
          retention-days: 1

      - name: Upload device library
        uses: actions/upload-artifact@v7
        with:
          name: rust-ios-device-lib
          path: target/aarch64-apple-ios/release/libshared.a
          retention-days: 1

  # ─────────────────────────────────────────────
  # Build iOS app (device target, no code signing)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS App
    runs-on: macos-14
    needs: build-rust
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
            /opt/homebrew/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}-${{ runner.arch }}

      - name: Install XcodeGen
        run: brew install xcodegen && brew link --overwrite xcodegen 2>/dev/null || true

      - name: Download device Rust library
        uses: actions/download-artifact@v8
        with:
          name: rust-ios-device-lib
          path: target/aarch64-apple-ios/release/

      - name: Cache Xcode DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-deriveddata-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('ios/project.yml', 'ios/Intrada/**/*.swift') }}
          restore-keys: |
            xcode-deriveddata-${{ runner.os }}-${{ env.XCODE_VERSION }}-

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build for device (no code signing)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild build \
            -project Intrada.xcodeproj \
            -scheme Intrada \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty --color

  # ─────────────────────────────────────────────
  # Deploy to TestFlight via Fastlane (main only)
  # ─────────────────────────────────────────────
  deploy-testflight:
    name: Deploy to TestFlight
    runs-on: macos-14
    needs: [build-rust, build-ios]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar/xcodegen
            /opt/homebrew/Cellar/xcodegen
          key: brew-xcodegen-${{ runner.os }}-${{ runner.arch }}

      - name: Install XcodeGen
        run: brew install xcodegen && brew link --overwrite xcodegen 2>/dev/null || true

      - name: Cache Ruby gems (Fastlane)
        uses: actions/cache@v4
        with:
          path: ios/vendor/bundle
          key: gems-${{ runner.os }}-${{ hashFiles('ios/Gemfile.lock') }}
          restore-keys: |
            gems-${{ runner.os }}-

      - name: Install Fastlane
        run: |
          cd ios
          bundle config path vendor/bundle
          bundle install

      - name: Download device Rust library
        uses: actions/download-artifact@v8
        with:
          name: rust-ios-device-lib
          path: target/aarch64-apple-ios/release/

      - name: Download simulator Rust library
        uses: actions/download-artifact@v8
        with:
          name: rust-ios-sim-lib
          path: target/aarch64-apple-ios-sim/release/

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Run Fastlane beta
        working-directory: ios
        env:
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
        run: bundle exec fastlane beta
