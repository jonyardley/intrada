          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div id="p-time" style="font-family:Inter;font-weight:600;font-size:46px;color:#2B2A26;font-variant-numeric:tabular-nums;line-height:1;">3:12</div><div style="font-size:12px;color:#6E6557;margin-top:6px;">of 7:00</div><div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#9A927F;margin-top:8px;"><i data-lucide="activity" width="12" height="12"></i>♩ = 96</div></div>

<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:392,&quot;height&quot;:860}}">
class Component extends DCLogic {
  componentDidMount() {
    if (window.lucide) window.lucide.createIcons();
    this.startPlayer();
    this.bindReps();
  }
  componentWillUnmount() { if (this._t) clearInterval(this._t); }
  startPlayer() {
    const r = 86, circ = 2 * Math.PI * r, total = 420;
    let sec = 192;
    const ring = document.querySelector('#p-ring'), time = document.querySelector('#p-time');
    if (ring) { ring.setAttribute('stroke-dasharray', circ); ring.setAttribute('stroke-dashoffset', circ * (1 - sec / total)); }
    this._t = setInterval(() => {
      sec++; if (sec > total) sec = 192;
      if (time) { const m = Math.floor(sec / 60), s = sec % 60; time.textContent = m + ':' + String(s).padStart(2, '0'); }
      if (ring) ring.setAttribute('stroke-dashoffset', circ * (1 - sec / total));
    }, 1000);
  }
  bindReps() {
    const total = 12; let done = 7;
    const seq = document.querySelector('#rep-seq'), doneEl = document.querySelector('#rep-done');
    const render = () => {
      if (doneEl) doneEl.textContent = done;
      if (seq) {
        seq.innerHTML = '';
        for (let i = 0; i < total; i++) {
          const s = document.createElement('span');
          s.style.cssText = 'width:11px;height:11px;border-radius:50%;' + (i < done ? 'background:#1F8A5B;' : 'background:transparent;box-shadow:inset 0 0 0 1.6px #DCD4C1;');
          seq.appendChild(s);
        }
      }
    };
    const clean = document.querySelector('#rep-clean-btn'), miss = document.querySelector('#rep-miss-btn');
    if (clean) clean.addEventListener('click', () => { done = Math.min(total, done + 1); render(); });
    if (miss) miss.addEventListener('click', () => { done = Math.max(0, done - 1); render(); });
    render();
  }
}
</script>
